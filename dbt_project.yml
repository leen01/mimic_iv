name: mimic_rwe
version: 1.0.0
config-version: 2

profile: mimic_rwe

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
docs-paths: ["docs"]
asset-paths: ["assets"]
clean-targets: ["target", "dbt_packages"]

models:
  mimic_rwe:
    staging:
      +schema: HOSP
      +materialized: view        # staging = views, cheap to rebuild
    marts:
      +schema: MARTS             # separate schema for clean marts
      +materialized: table       # marts = tables, fast to query from Python